{# _devfile_section_import.html — paste and validate an existing devfile YAML #}
<div class="section" id="section-import">
    <div class="section-header">
        <h2>// import &amp; validate</h2>
        <p>Paste an existing devfile YAML to parse, validate it against the schema, and load it into the configurator.
        </p>
    </div>

    <div class="card">
        <div class="card-header"><span class="card-title">Paste Devfile YAML</span></div>
        <textarea id="import-yaml-input" placeholder="Paste your devfile YAML here..."
            style="min-height:220px;"></textarea>
        <div class="flex-gap mt-16">
            <button class="btn btn-primary" id="do-import-btn">Parse &amp; Validate</button>
            <button class="btn btn-ghost" id="clear-import-btn">Clear</button>
        </div>
        <div id="import-status" class="mt-16" style="display:none"></div>
    </div>

    <div class="card mt-16" id="import-result-card" style="display:none">
        <div class="card-header"><span class="card-title">Parsed Structure</span></div>
        <div class="code-block" id="import-json-output" style="max-height:300px;"></div>
    </div>
</div>
