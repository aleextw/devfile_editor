<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Devfile YAML ↔ JSON Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 8px;
        }

        label {
            font-weight: bold;
            margin-top: 16px;
            display: block;
        }

        #output,
        #yaml-output {
            background: #f5f5f5;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h2>Devfile YAML ↔ JSON Converter & Validator</h2>

    <label for="yaml-input">Input Devfile YAML</label>
    <textarea id="yaml-input" placeholder="Paste Devfile YAML here..."></textarea>

    <button id="parse-btn">Parse (YAML → JSON)</button>
    <span id="error-msg" class="error"></span>

    <label for="json-output">Parsed JSON (Validated as Devfile)</label>
    <textarea id="json-output" readonly></textarea>

    <button id="serialize-btn">Serialize (JSON → YAML)</button>
    <span id="yaml-msg"></span>

    <label for="yaml-output">Serialized Devfile YAML</label>
    <textarea id="yaml-output" readonly></textarea>

    <!-- js-yaml CDN -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <!-- Deep equality check CDN (like lodash) -->
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <!-- Devfile JS Class bundle (ensure valid path!) -->
    <script type="module">
        import { Devfile } from './devfile.js'; // Adjust the path according to your setup

        // Get UI elements
        const yamlInput = document.getElementById('yaml-input');
        const parseBtn = document.getElementById('parse-btn');
        const jsonOutput = document.getElementById('json-output');
        const serializeBtn = document.getElementById('serialize-btn');
        const yamlOutput = document.getElementById('yaml-output');
        const errorMsg = document.getElementById('error-msg');
        const yamlMsg = document.getElementById('yaml-msg');

        let parsedDevfile = null;  // Holds the Devfile instance

        function omitUntruthy(obj) {
            if (Array.isArray(obj)) {
                return obj
                    .map(omitUntruthy)
                    .filter(val => val !== undefined && val !== null && !(typeof val === 'object' && Object.keys(val).length === 0));
            } else if (obj && typeof obj === 'object') {
                const cleaned = {};
                for (const [key, val] of Object.entries(obj)) {
                    if (
                        val !== undefined &&
                        val !== null &&
                        val !== false &&
                        val !== '' &&
                        !(Array.isArray(val) && val.length === 0) &&
                        !(typeof val === 'object' && !Array.isArray(val) && Object.keys(val).length === 0)
                    ) {
                        cleaned[key] = omitUntruthy(val);
                    }
                }
                return cleaned;
            } else {
                return obj;
            }
        }

        // Parse YAML → Devfile → JSON
        parseBtn.addEventListener('click', () => {
            errorMsg.textContent = '';
            jsonOutput.value = '';
            yamlMsg.textContent = '';
            yamlOutput.value = '';
            parsedDevfile = null; // Reset

            try {
                const data = jsyaml.load(yamlInput.value);
                parsedDevfile = new Devfile(data); // Validate per class
                jsonOutput.value = JSON.stringify(parsedDevfile, null, 2);
            } catch (e) {
                errorMsg.textContent = 'Error: ' + e.message;
                parsedDevfile = null;
            }
        });

        // Serialize Devfile → YAML
        serializeBtn.addEventListener('click', () => {
            yamlMsg.textContent = '';
            yamlOutput.value = '';
            if (!parsedDevfile) {
                yamlMsg.textContent = '❗ Please parse YAML first.';
                yamlMsg.className = 'error';
                return;
            }
            try {
                // Convert the Devfile object back to plain JSON for serialization
                const plain = JSON.parse(JSON.stringify(parsedDevfile));
                const yamlSerialized = jsyaml.dump(omitUntruthy(plain), { sortKeys: false, lineWidth: 160 });
                yamlOutput.value = yamlSerialized;

                // Compare input and output YAML by normalizing and loading as JSON
                let inputYamlObj, outputYamlObj;
                try {
                    inputYamlObj = jsyaml.load(yamlInput.value);
                    outputYamlObj = jsyaml.load(yamlSerialized);
                } catch (err) {
                    yamlMsg.textContent = 'Failed to compare YAML due to parsing error.';
                    yamlMsg.className = 'error';
                    return;
                }

                const isEqual = _.isEqual(inputYamlObj, outputYamlObj);
                if (isEqual) {
                    yamlMsg.textContent = '✔ Input YAML and output YAML represent the same data.';
                    yamlMsg.className = 'success';
                } else {
                    yamlMsg.textContent = '❗ Input and output YAML differ. See the boxes for details.';
                    yamlMsg.className = 'error';
                }
            } catch (e) {
                yamlMsg.textContent = 'Error serializing Devfile: ' + e.message;
                yamlMsg.className = 'error';
            }
        });
    </script>
</body>

</html>
